<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Text Interaction</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        .input_video { display: none; }

        #ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(40, 10, 20, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 60, 90, 0.3);
            border-radius: 12px;
            padding: 15px 25px;
            color: rgba(255, 240, 245, 0.95);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            text-align: right;
            min-width: 180px;
        }

        .status-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff69b4;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        .instruction {
            font-size: 13px;
            color: #ddd;
            line-height: 1.7;
        }

        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #dc143c;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <video class="input_video"></video>
    <div id="loading">✨ 正在生成文字矩阵...</div>

    <div id="ui-container">
        <div class="glass-panel">
            <div id="mode-display" class="status-text">当前：你</div>
            <div class="instruction">
                ✊ <b>单手握拳</b> ⮕ 凝聚文字<br>
                🖐 <b>单手张开</b> ⮕ 炸裂散开<br>
                🙌 <b>双手张开</b> ⮕ 切换下一个
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔶 配置参数
        // ==========================================
        const PARTICLE_COUNT = 45000; // 粒子总数
        const CAM_POS = { x: 0, y: 0, z: 22 };
        const SCATTER_RANGE = 55.0; // 扩散范围
        
        // 目标文字列表
        const TARGET_CHARS = ["你", "好", "王", "禹", "善"];
        
        // 颜色配置 (深红 -> 亮粉)
        const COLOR_CORE = new THREE.Color(0.8, 0.0, 0.2); // 核心颜色
        const COLOR_OUTER = new THREE.Color(1.0, 0.5, 0.6); // 边缘颜色

        // ==========================================
        // 🔶 1. 场景初始化
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(CAM_POS.x, CAM_POS.y, CAM_POS.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 🔶 2. 汉字粒子生成器
        // ==========================================
        const shapes = []; 

        function generateText(text) {
            const arr = new Float32Array(PARTICLE_COUNT * 3);
            
            // 创建离屏 Canvas 用于文字取样
            const canvas = document.createElement('canvas');
            const size = 256; // 分辨率越高文字越细腻
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // 绘制文字
            ctx.fillStyle = '#000000'; // 背景黑
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff'; // 文字白
            ctx.font = 'bold 180px "Microsoft YaHei", sans-serif'; // 字体大一点
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, size/2, size/2);
            
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            const validPixels = [];

            // 扫描像素，收集白色区域坐标
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const alpha = data[(y * size + x) * 4]; // 只看 Alpha 或 Red 通道均可，这里用 Red
                    if (data[(y * size + x) * 4] > 50) { // 亮度阈值
                        validPixels.push({
                            x: (x / size - 0.5) * 16, // 16是文字在3D空间的宽度
                            y: -(y / size - 0.5) * 16 // Y轴翻转，Canvas向下，3D向上
                        });
                    }
                }
            }

            // 将粒子随机填充到文字形状中
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // 如果像素点不够，随机取；如果够多，尽量均匀
                const pixel = validPixels[Math.floor(Math.random() * validPixels.length)];
                
                // 给文字增加厚度 (Z轴)
                const zDepth = (Math.random() - 0.5) * 3.0; 
                
                arr[i*3] = pixel.x + (Math.random()-0.5)*0.2; // 增加微小抖动防止排列太死板
                arr[i*3+1] = pixel.y + (Math.random()-0.5)*0.2;
                arr[i*3+2] = zDepth;
            }
            return arr;
        }

        // 生成所有汉字数据
        TARGET_CHARS.forEach(char => {
            shapes.push(generateText(char));
        });

        // 生成随机散开数据
        const randomPositions = new Float32Array(PARTICLE_COUNT * 3);
        for(let i=0; i<PARTICLE_COUNT*3; i++) {
            randomPositions[i] = (Math.random() * 2 - 1) * SCATTER_RANGE;
        }

        // ==========================================
        // 🔶 3. 构建 Three.js 粒子系统
        // ==========================================
        
        // 初始位置数据 (默认散开)
        const currentPositions = new Float32Array(randomPositions);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        
        // 初始化颜色
        const tmpColor = new THREE.Color();
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const r = Math.random(); // 随机混合因子
            tmpColor.lerpColors(COLOR_CORE, COLOR_OUTER, r);
            colors[i*3] = tmpColor.r;
            colors[i*3+1] = tmpColor.g;
            colors[i*3+2] = tmpColor.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.14,            // 粒子大小
            vertexColors: true,    // 使用顶点颜色
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending, // 发光混合
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);
        document.getElementById('loading').style.display = 'none';

        // ==========================================
        // 🔶 4. 交互逻辑 (MediaPipe Hands)
        // ==========================================
        
        let targetShapeIndex = 0; // 当前文字索引
        let isAssemble = false;   // 是否凝聚
        let lastSwitchTime = 0;   // 切换冷却

        // 视觉状态 0=全散, 1=全聚
        let visualState = 0; 
        
        const videoElement = document.getElementsByClassName('input_video')[0];

        // 握拳检测算法
        function isHandFist(landmarks) {
            const wrist = landmarks[0];
            // 指尖索引
            const tips = [8, 12, 16, 20]; 
            let avgDist = 0;
            tips.forEach(idx => {
                const d = Math.sqrt(
                    Math.pow(landmarks[idx].x - wrist.x, 2) + 
                    Math.pow(landmarks[idx].y - wrist.y, 2)
                );
                avgDist += d;
            });
            avgDist /= 4;
            // 距离小说明手指蜷缩
            return avgDist < 0.25; 
        }

        function onResults(results) {
            const now = Date.now();
            const hands = results.multiHandLandmarks;

            // 🎯 逻辑 1: 双手张开 -> 切换下一个字
            if (hands && hands.length === 2) {
                const h1Open = !isHandFist(hands[0]);
                const h2Open = !isHandFist(hands[1]);

                if (h1Open && h2Open) {
                    // 冷却时间 1.5秒
                    if (now - lastSwitchTime > 1500) {
                        targetShapeIndex = (targetShapeIndex + 1) % TARGET_CHARS.length;
                        lastSwitchTime = now;
                        
                        // 更新UI
                        document.getElementById('mode-display').innerText = `当前：${TARGET_CHARS[targetShapeIndex]}`;
                        
                        // 切换时强制散开一瞬间
                        isAssemble = false;
                        return;
                    }
                }
            }

            // 🎯 逻辑 2: 单手握拳 -> 凝聚
            let hasFist = false;
            if (hands) {
                for (const hand of hands) {
                    if (isHandFist(hand)) {
                        hasFist = true;
                        break;
                    }
                }
            }
            isAssemble = hasFist;
        }

        const handTracker = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        handTracker.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        handTracker.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await handTracker.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();

        // ==========================================
        // 🔶 5. 动画循环
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            // const dt = clock.getDelta(); // 本次不需要时间增量

            // 1. 平滑过渡 visualState
            const targetVal = isAssemble ? 1.0 : 0.0;
            // 0.08 是平滑系数，越小越慢
            visualState += (targetVal - visualState) * 0.08; 

            // 2. 粒子插值
            const positions = particleSystem.geometry.attributes.position.array;
            const targetShape = shapes[targetShapeIndex]; // 获取当前目标文字的数据

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                const tx = targetShape[i3];
                const ty = targetShape[i3+1];
                const tz = targetShape[i3+2];

                const rx = randomPositions[i3];
                const ry = randomPositions[i3+1];
                const rz = randomPositions[i3+2];

                // Lerp 公式: Current = Random + (Target - Random) * State
                positions[i3]   = rx + (tx - rx) * visualState;
                positions[i3+1] = ry + (ty - ry) * visualState;
                positions[i3+2] = rz + (tz - rz) * visualState;
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            // ❌ 已删除：旋转逻辑
            // 粒子系统现在保持静止，或者你可以只在散开时保留一点点微动，凝聚时完全静止：
            if (visualState < 0.1) {
                // 仅在完全散开时有一点点漂浮感，增加生动性
                particleSystem.rotation.y = Math.sin(clock.getElapsedTime() * 0.2) * 0.05;
            } else {
                // 凝聚时回归正向，不旋转
                particleSystem.rotation.y *= 0.9; 
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
